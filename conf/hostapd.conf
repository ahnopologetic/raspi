# Wi-Fi Access Point configuration
# Copy to /etc/hostapd/hostapd.conf and fill in your values

interface=wlan0
driver=nl80211
ssid=YOUR_AP_SSID
hw_mode=g
channel=6
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=YOUR_AP_PASSWORD
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
